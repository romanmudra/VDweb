<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneTech | Precision Aerials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Courier New', monospace; }
        .accent { color: #f59e0b; } /* Jantarová / Tech oranžová */
        .grid-bg { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
        .border-tech { border: 1px solid #333; }
    </style>
</head>
<body class="grid-bg">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-black/50 backdrop-blur-xl fixed w-full z-50">
        <div class="font-black tracking-widest text-xl">D-TECH [M4PRO]</div>
        <div class="space-x-8 text-xs uppercase font-bold tracking-[0.2em]">
            <a href="#" class="hover:text-amber-500 transition">Reality</a>

            <a href="#" class="border border-amber-500 px-4 py-2 text-amber-500">Contact_Us</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center px-10 pt-20">
        <div class="border-l-4 border-amber-500 pl-8">

            <div class="flex gap-4">
