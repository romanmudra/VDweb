<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISTADRONE | Profesionální záběry z dronu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050507; color: white; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .hero-bg {
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
            url('https://images.unsplash.com/photo-1508614589041-895b88991e3e?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center;
        }
        .text-outline-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .secondary-text-glow { color: rgba(255, 255, 255, 0.3); }
        .btn-cyan {
            background-color: #00f2ff; color: black;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-cyan:hover { background-color: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- Navigace -->
    <nav class="fixed w-full z-50 px-10 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- TADY JE TA ZMĚNA NÁZVU -->
            <div class="font-orbitron text-2xl font-black tracking-tighter uppercase">
                VISTA<span class="text-[#00f2ff]">DRONE</span>
            </div>
            
            <div class="hidden md:flex space-x-12 text-[10px] font-black uppercase tracking-[0.3em]">
                <a href="#reality" class="hover:text-[#00f2ff] transition">Reality</a>
                <a href="#svatby" class="hover:text-[#00f2ff] transition">Svatby</a>
                <a href="#kontakt" class="hover:text-[#00f2ff] transition">Kontakt</a>
            </div>

            <a href="#kontakt" class="bg-white text-black px-8 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-[#00f2ff] transition">
                Poptat
            </a>
        </div>
    </nav>

    <!-- Hero Sekce -->
    <header class="h-screen flex items-center justify-center text-center px-4 hero-bg">
        <div class="max-w-5xl">
            <span class="text-[#00f2ff] font-bold tracking-[0.4em] uppercase text-[10px] mb-6 block opacity-80">
                Aerial Cinematography / DJI Mini 4 Pro
            </span>
            
            <div class="relative">
                <h1 class="font-orbitron text-6xl md:text-[100px] font-black leading-none mb-0 text-outline-glow">
                    ZMĚŇTE
                </h1>
                <h2 class="font-orbitron text-5xl md:text-[85px] font-black leading-none mt-[-10px] secondary-text-glow uppercase tracking-tight">
                    perspektivu
                </h2>
            </div>

            <p class="text-sm md:text-base text-gray-400 mt-12 mb-14 max-w-xl mx-auto font-light leading-relaxed">
                Filmové 4K HDR záběry nemovitostí, které prodávají, a svatebních okamžiků, které berou dech.
            </p>

            <div class="flex flex-col md:flex-row justify-center gap-6">
                <a href="#reality" class="btn-cyan px-12 py-4 rounded-full font-black text-xs uppercase tracking-[0.2em]">
                    Realitní Portfolio
                </a>
                <a href="#svatby" class="bg-white/5 backdrop-blur-md border border-white/10 px-12 py-4 rounded-full font-black text-xs uppercase tracking-[0.2em] hover:bg-white/10 transition">
                    Svatební Emoce
                </a>
            </div>
        </div>
    </header>

</body>
</html>
